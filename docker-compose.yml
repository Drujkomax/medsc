services:
  db:
    image: postgres:15
    container_name: test-msc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "55432:5432"        # нестандартный порт, чтобы не конфликтовать с локальным PG
    volumes:
      - test_msc_pgdata:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro   # 00→90 выполнятся по порядку при первой инициализации
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: test-msc-adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8080"         # http://localhost:8081 (System: PostgreSQL, Server: db, user/pass: postgres)

volumes:
  test_msc_pgdata:
